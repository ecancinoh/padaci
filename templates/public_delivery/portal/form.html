{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block active_public_delivery %}active{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">{{ titulo }}</h1>
    <a href="{% url 'public_delivery:portal_list' %}" class="btn btn-secondary btn-sm">
      <i class="fas fa-arrow-left fa-sm mr-1"></i> Volver
    </a>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="row">
      <div class="col-lg-6">
        <div class="card shadow mb-4">
          <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Datos generales</h6></div>
          <div class="card-body">
            <div class="form-group">
              <label class="font-weight-bold">Vehículo</label>
              <select name="vehicle" class="form-control">
                {% for val, label in vehicle_choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label class="font-weight-bold">Conductor</label>
              <select name="driver" class="form-control">
                <option value="">— Sin asignar —</option>
                {% for c in conductores %}
                <option value="{{ c.pk }}">{{ c.get_full_name|default:c.username }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label class="font-weight-bold">Fecha programada</label>
              <input type="date" name="scheduled_for" class="form-control" />
            </div>
            <div class="form-group">
              <label class="font-weight-bold">Nombre cliente</label>
              <input type="text" name="client_name" class="form-control" placeholder="Nombre o empresa" />
            </div>
            <div class="form-group">
              <label class="font-weight-bold">Teléfono cliente</label>
              <input type="text" name="client_phone" class="form-control" placeholder="+56 9 ..." />
            </div>
            <div class="form-group">
              <label class="font-weight-bold">Notas</label>
              <textarea name="notes" class="form-control" rows="2" placeholder="Instrucciones generales, referencias, etc."></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card shadow mb-4">
          <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <h6 class="m-0 font-weight-bold text-primary">Paradas</h6>
            <button type="button" id="btn-add-stop" class="btn btn-sm btn-outline-primary">
              <i class="fas fa-plus"></i> Agregar parada
            </button>
          </div>
          <div class="card-body">
            <div id="paradas-container">
              <!-- inicial -->
              <div class="parada-row mb-3 p-3 border rounded">
                <div class="d-flex align-items-center justify-content-between mb-2">
                  <span class="font-weight-bold text-muted small">Parada 1</span>
                  <button type="button" class="btn btn-sm btn-outline-danger btn-remove-stop">
                    <i class="fas fa-times"></i>
                  </button>
                </div>
                <input type="text" name="parada_label" class="form-control form-control-sm mb-2" placeholder="Descripción (ej: Entrega en Machalí)" required />
                <input type="text" name="parada_address" class="form-control form-control-sm" placeholder="Dirección completa" />
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-save mr-1"></i> Crear entrega
        </button>
      </div>
    </div>
  </form>
</div>

<script>
let stopCount = 1;

document.getElementById('btn-add-stop').addEventListener('click', function() {
  stopCount++;
  const div = document.createElement('div');
  div.className = 'parada-row mb-3 p-3 border rounded';
  div.innerHTML = `
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="font-weight-bold text-muted small">Parada ${stopCount}</span>
      <button type="button" class="btn btn-sm btn-outline-danger btn-remove-stop">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <input type="text" name="parada_label" class="form-control form-control-sm mb-2" placeholder="Descripción" />
    <input type="text" name="parada_address" class="form-control form-control-sm" placeholder="Dirección completa" />
  `;
  document.getElementById('paradas-container').appendChild(div);
  div.querySelector('.btn-remove-stop').addEventListener('click', () => div.remove());
});

document.querySelectorAll('.btn-remove-stop').forEach(btn => {
  btn.addEventListener('click', () => btn.closest('.parada-row').remove());
});
</script>
{% endblock %}
