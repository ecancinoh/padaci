<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>PADACI – Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Nunito:400,700,800,900" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-primary">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-xl-10 col-lg-12 col-md-9">
      <div class="card o-hidden border-0 shadow-lg my-5">
        <div class="card-body p-0">
          <div class="row">
            <div class="col-lg-6 d-none d-lg-block bg-login-image"
                 style="background: linear-gradient(135deg,#4e73df,#224abe); min-height:450px; display:flex; align-items:center; justify-content:center;">
              <div class="text-center text-white p-5">
                <i class="fas fa-truck fa-5x mb-3"></i>
                <h2 class="font-weight-bold">PADACI</h2>
                <p class="lead">Sistema de Logística de Entrega de Paquetería</p>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="p-5">
                <div class="text-center">
                  <h1 class="h4 text-gray-900 mb-4">¡Bienvenido de vuelta!</h1>
                </div>
                {% if form.errors %}
                  <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
                {% endif %}
                <form class="user" method="post">
                  {% csrf_token %}
                  <div class="form-group">
                    <input type="text" name="username" class="form-control form-control-user"
                           placeholder="Usuario" autofocus required>
                  </div>
                  <div class="form-group">
                    <input type="password" name="password" class="form-control form-control-user"
                           placeholder="Contraseña" required>
                  </div>
                  <button type="submit" class="btn btn-primary btn-user btn-block">
                    <i class="fas fa-sign-in-alt mr-1"></i> Ingresar
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/js/sb-admin-2.min.js"></script>
</body>
</html>
